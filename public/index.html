<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phaser & Node.js Multiplayer Shooter</title>
    <!-- Nhúng thư viện đồ họa Phaser và kết nối mạng Socket.IO -->
    <script src="https://jsdelivr.net"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let socket;
let bullets;
let otherBullets;

function preload() {
    // Không cần tải ảnh bên ngoài, game sẽ tự vẽ hình tam giác và hình tròn trực tiếp
}

function create() {
    const self = this;
    socket = io();
    
    this.otherPlayers = this.physics.add.group();
    bullets = this.physics.add.group();
    otherBullets = this.physics.add.group();

    // Khởi tạo các phím di chuyển (Mũi tên)
    this.cursors = this.input.keyboard.createCursorKeys();

    // 1. Nhận danh sách người chơi khi vừa vào phòng
    socket.on('currentPlayers', (players) => {
        Object.keys(players).forEach((id) => {
            if (id === socket.id) {
                addPlayer(self, players[id]);
            } else {
                addOtherPlayers(self, players[id]);
            }
        });
    });

    // 2. Nhận thông báo có người chơi mới tham gia
    socket.on('newPlayer', (playerInfo) => {
        addOtherPlayers(self, playerInfo);
    });

    // 3. Cập nhật vị trí và góc xoay của kẻ địch khi họ di chuyển
    socket.on('playerMoved', (playerInfo) => {
        self.otherPlayers.getChildren().forEach((otherPlayer) => {
            if (playerInfo.id === otherPlayer.id) {
                otherPlayer.setPosition(playerInfo.x, playerInfo.y);
                otherPlayer.setRotation(playerInfo.rotation);
            }
        });
    });

    // 4. Nhận thông báo từ server khi kẻ địch bắn đạn
    socket.on('bulletSpawned', (bulletData) => {
        let b = self.add.circle(bulletData.x, bulletData.y, 4, 0xffff00);
        self.physics.add.existing(b);
        self.physics.velocityFromRotation(bulletData.rotation, 600, b.body.velocity);
        otherBullets.add(b);
    });

    // 5. Xóa nhân vật kẻ địch khi họ thoát game
    socket.on('playerDisconnected', (id) => {
        self.otherPlayers.getChildren().forEach((otherPlayer) => {
            if (id === otherPlayer.id) {
                otherPlayer.destroy();
            }
        });
    });

    // Lắng nghe sự kiện CLICK CHUỘT TRÁI ĐỂ BẮN SÚNG
    this.input.on('pointerdown', (pointer) => {
        if (self.ship) {
            // Tạo viên đạn trên màn hình của mình (Màu trắng)
            let b = self.add.circle(self.ship.x, self.ship.y, 4, 0xffffff);
            self.physics.add.existing(b);
            self.physics.velocityFromRotation(self.ship.rotation, 600, b.body.velocity);
            bullets.add(b);

            // Gửi dữ liệu viên đạn lên server để đồng bộ cho người khác
            socket.emit('playerFired', {
                x: self.ship.x,
                y: self.ship.y,
                rotation: self.ship.rotation
            });
        }
    });
}

function update() {
    if (this.ship) {
        let moved = false;

        // Xử lý di chuyển bằng cụm phím mũi tên
        if (this.cursors.left.isDown) { this.ship.x -= 4; moved = true; }
        else if (this.cursors.right.isDown) { this.ship.x += 4; moved = true; }
        
        if (this.cursors.up.isDown) { this.ship.y -= 4; moved = true; }
        else if (this.cursors.down.isDown) { this.ship.y += 4; moved = true; }

        // Xử lý xoay đầu nhân vật theo con trỏ chuột
        let angle = Phaser.Math.Angle.Between(this.ship.x, this.ship.y, this.input.activePointer.x, this.input.activePointer.y);
        if (this.ship.rotation !== angle) {
            this.ship.setRotation(angle);
            moved = true; 
        }

        // Nếu có bất kỳ sự thay đổi nào về vị trí hoặc góc nhìn thì gửi lên server
        if (moved) {
            socket.emit('playerMovement', { 
                x: this.ship.x, 
                y: this.ship.y, 
                rotation: this.ship.rotation 
            });
        }
    }
}

// Hàm khởi tạo nhân vật của bạn (Hình tam giác màu xanh lam)
function addPlayer(scene, playerInfo) {
    scene.ship = scene.add.triangle(playerInfo.x, playerInfo.y, 0, 20, 20, 0, 20, 20, 0x0000ff);
    scene.physics.add.existing(scene.ship);
}

// Hàm khởi tạo nhân vật đối thủ (Hình tam giác màu đỏ)
function addOtherPlayers(scene, playerInfo) {
    const otherPlayer = scene.add.triangle(playerInfo.x, playerInfo.y, 0, 20, 20, 0, 20, 20, 0xff0000);
    otherPlayer.id = playerInfo.id;
    if (playerInfo.rotation) {
        otherPlayer.setRotation(playerInfo.rotation);
    }
    scene.otherPlayers.add(otherPlayer);
}
</script>
</body>
</html>
